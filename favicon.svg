<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#ffffff"/>
  
  <!-- Book shape -->
  <rect x="8" y="10" width="7" height="13" rx="1" fill="#1a5bc4"/>
  <rect x="17" y="10" width="7" height="13" rx="1" fill="#2e6ee8"/>
  
  <!-- Book spine / center line -->
  <rect x="15" y="10" width="2" height="13" fill="#ffffff"/>
  
  <!-- PLI letters at top -->
  <text x="16" y="9" font-family="Georgia, serif" font-size="4.5" font-weight="bold" fill="#2e6ee8" text-anchor="middle" letter-spacing="0.5">PLI</text>
  
  <!-- Star accent -->
  <text x="16" y="27" font-family="Arial" font-size="5" fill="#1a5bc4" text-anchor="middle">★</text>
</svg>
